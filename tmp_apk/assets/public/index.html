<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#FFF5E6;font-family:sans-serif;display:flex;justify-content:center;align-items:center}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0}

</style></head><body>
<div id="app"></div>
<div id="_err" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:4px;background:orange;font-size:12px;text-align:center">Loading...</div>
<div id="_err" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:4px;font-size:12px;text-align:center;background:orange;color:black">Loading...</div><script>window.onerror=function(m,u,l){var d=document.getElementById("_err");d.textContent="ERR: "+m+" line:"+l;d.style.background="red";d.style.color="white";return true};</script><script>console.log("Gomoku JS loaded");const BS=19,EMPTY=null,BLACK="black",WHITE="white";
let state={screen:"menu",mode:null,board:[],currentPlayer:BLACK,gameOver:false,lastMove:null,winLine:null,moveHistory:[],ws:null,roomCode:null,myColor:null,isMyTurn:false,connected:false,wakeLock:null,pendingMove:null};
const canvas=document.getElementById("board-canvas"),ctx=canvas.getContext("2d");
let cellSize=0,bPad=0,logSize=0;const DPR=Math.min(window.devicePixelRatio||1,2);
function resizeCanvas(){const c=canvas.parentElement,sz=Math.min(c.getBoundingClientRect().width+0,c.getBoundingClientRect().height+0,99999);logSize=sz;canvas.style.width=sz+"px";canvas.style.height=sz+"px";canvas.width=sz*DPR;canvas.height=sz*DPR;ctx.scale(DPR,DPR);bPad=sz*0.05;cellSize=(sz-bPad*2)/(BS-1);renderBoard()}
function b2p(r,c){return{x:bPad+c*cellSize,y:bPad+r*cellSize}}
function p2b(px,py){const c=Math.round((px-bPad)/cellSize),r=Math.round((py-bPad)/cellSize);if(r<0||r>=BS||c<0||c>=BS)return null;const p=b2p(r,c);return Math.hypot(px-p.x,py-p.y)>cellSize*0.48?null:{row:r,col:c}}
function initBoard(){return Array.from({length:BS},()=>Array(BS).fill(EMPTY))}
function renderBoard(){const s=logSize;const g=ctx.createLinearGradient(0,0,s,s);g.addColorStop(0,"#E8C49A");g.addColorStop(0.3,"#DDB892");g.addColorStop(0.6,"#E8C49A");g.addColorStop(1,"#C99979");ctx.fillStyle=g;ctx.fillRect(0,0,s,s);ctx.save();ctx.globalAlpha=0.04;for(var i=0;i<20;i++){var yy=Math.random()*s;ctx.strokeStyle="#000";ctx.lineWidth=1+Math.random()*2;ctx.beginPath();ctx.moveTo(0,yy);for(var x=0;x<s;x+=6){ctx.lineTo(x,yy+Math.sin(x*0.03+i)*2)}ctx.stroke()};ctx.restore();ctx.strokeStyle="#A1887F";ctx.lineWidth=0.6;for(let i=0;i<BS;i++){const a=b2p(i,0),b2=b2p(i,BS-1);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b2.x,b2.y);ctx.stroke();const c=b2p(0,i),d2=b2p(BS-1,i);ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(d2.x,d2.y);ctx.stroke()};ctx.strokeStyle="#8D6E63";ctx.lineWidth=1;[[0,0],[0,BS-1],[BS-1,0],[BS-1,BS-1]].forEach(([r,c])=>{const p=b2p(r,c);ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle="#C99979";ctx.fill()})
ctx.strokeStyle="#8D6E63";ctx.lineWidth=2.5;const t=b2p(0,0),b=b2p(BS-1,BS-1);ctx.shadowColor="rgba(0,0,0,0.08)";ctx.shadowBlur=8;ctx.shadowOffsetY=2;ctx.strokeRect(t.x,t.y,b.x-t.x,b.y-t.y);ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetY=0;ctx.shadowColor="transparent";ctx.fillStyle="#D7CCC8";[[t.x-4,t.y-4],[b.x+4,t.y-4],[t.x-4,b.y+4],[b.x+4,b.y+4]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill()});ctx.fillStyle="#8D6E63";[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]].forEach(([r,c])=>{const p=b2p(r,c);ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle="#D7CCC8";ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle="#8D6E63";ctx.fill()})
for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(state.board[r][c]!==null)drawStone(r,c,state.board[r][c]);if(state.lastMove){const p=b2p(state.lastMove.row,state.lastMove.col);ctx.fillStyle="#FF8A80";ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fill()}

function drawStone(r,c,color,opacity){const p=b2p(r,c),rad=cellSize*0.43;ctx.save();if(typeof opacity==="number")ctx.globalAlpha=opacity;ctx.beginPath();ctx.arc(p.x+1.5,p.y+1.5,rad,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.15)";ctx.fill();const g=ctx.createRadialGradient(p.x-rad*0.25,p.y-rad*0.25,rad*0.1,p.x,p.y,rad);if(color===BLACK){g.addColorStop(0,"#A1887F");g.addColorStop(0.5,"#6D4C41");g.addColorStop(1,"#4E342E")}else{g.addColorStop(0,"#FFF8E1");g.addColorStop(0.5,"#FFECB3");g.addColorStop(1,"#FFE082")}

function getPos(e){const r=canvas.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:(cx-r.left)*(logSize/r.width),y:(cy-r.top)*(logSize/r.height)}}
function checkWin(r,c,player){const dirs=[[1,0],[0,1],[1,1],[1,-1]];for(const[dx,dy]of dirs){let cnt=1;for(let i=1;i<5;i++){const rr=r+dx*i,cc=c+dy*i;if(rr<0||rr>=BS||cc<0||cc>=BS||state.board[rr][cc]!==player)break;cnt++}for(let i=1;i<5;i++){const rr=r-dx*i,cc=c-dy*i;if(rr<0||rr>=BS||cc<0||cc>=BS||state.board[rr][cc]!==player)break;cnt++}if(cnt>=5)return true}return false}
function getWinLine(r,c,player){const dirs=[[1,0],[0,1],[1,1],[1,-1]];for(const[dx,dy]of dirs){const cells=[[r,c]];for(let i=1;i<5;i++){const rr=r+dx*i,cc=c+dy*i;if(rr<0||rr>=BS||cc<0||cc>=BS||state.board[rr][cc]!==player)break;cells.push([rr,cc])}for(let i=1;i<5;i++){const rr=r-dx*i,cc=c-dy*i;if(rr<0||rr>=BS||cc<0||cc>=BS||state.board[rr][cc]!==player)break;cells.push([rr,cc])}if(cells.length>=5)return cells}return[[r,c]]}

function updateUI(){const s=document.getElementById("turn-stone"),t=document.getElementById("turn-text"),ml=document.getElementById("game-mode-label"),bd=document.getElementById("room-code-badge"),cn=document.getElementById("conn-status");if(state.mode==="online"){ml.textContent="Online";bd.classList.remove("hidden");bd.textContent="房间 "+state.roomCode;cn.classList.remove("hidden");cn.textContent=state.connected?"Connected":"Disconnected";cn.className="conn-status "+(state.connected?"connected":"disconnected")}else{ml.textContent="Local";bd.classList.add("hidden");cn.classList.add("hidden")}if(state.gameOver)return;const p=state.currentPlayer;s.className="turn-stone "+p;const n=p.charAt(0).toUpperCase()+p.slice(1);let st="'s turn";if(state.mode==="online")st=state.isMyTurn?" - Your turn":" - Waiting";t.innerHTML="<span class=\"highlight\">"+n+"</span>"+st}
function startLocalGame(){state.pendingMove=null;state.mode="local";state.board=initBoard();state.currentPlayer=BLACK;state.gameOver=false;state.lastMove=null;state.winLine=null;state.moveHistory=[];document.getElementById("game-over-overlay").classList.remove("show");showScreen("game");updateUI();renderBoard()}
function showOnlineMenu(){document.getElementById("room-code-input").value="";var ui=document.getElementById("server-url");if(ui){var s=localStorage.getItem("gomoku_server_url");var ia=typeof Android!=="undefined"||navigator.userAgent.indexOf("Android")>=0;var d=ia?"":(typeof Android!=="undefined"&&Android.getServerUrl)?Android.getServerUrl():"ws://"+location.host;if(ia||d==="ws://"||d==="ws://localhost"||d==="ws://localhost:80")ui.value="";else ui.value=s||d;if(ui.value==="")ui.placeholder=s?"修改服务器地址":"安卓APP: 输入电脑IP:4000"}showScreen("online-menu")}
function showMenu(){document.getElementById("game-over-overlay").classList.remove("show");if(typeof dropMenu==="function")dropMenu();showScreen("menu")}
function backToMenu(){state.pendingMove=null;if(state.ws){try{state.ws.close()}catch(e){}state.ws=null}state.connected=false;state.mode=null;state.roomCode=null;state.myColor=null;document.getElementById("game-over-overlay").classList.remove("show");showScreen("menu")}
function getServerUrl(){var s=localStorage.getItem("gomoku_server_url");if(s)return s;if(typeof Android!=="undefined"&&Android.getServerUrl)return Android.getServerUrl();var wp=location.protocol==="https:"?"wss://":"ws://";return wp+location.host}

function connectWS(){if(state.ws&&state.ws.readyState===WebSocket.OPEN)return;showToast("正在连接...");try{var u=getServerUrl();if(!u||u==="ws://"||u==="ws://:"){showToast("请输入服务器地址");state.connected=false;updateUI();return}const w=new WebSocket(u);state.ws=w;w.onopen=()=>{state.connected=true;updateUI()};w.onclose=()=>{state.connected=false;updateUI()};w.onerror=()=>{var em="连接失败";if(navigator.userAgent.indexOf("Android")>=0)em+=" - 请检查电脑IP和端口";else em+=" - 服务器是否在运行?";showToast(em);state.connected=false;updateUI()};w.onmessage=e=>{try{handleMsg(JSON.parse(e.data))}catch(e){}}}catch(e){showToast("无效的地址: "+getServerUrl());state.ws=null}}

function handleMsg(m){switch(m.type){case"room_created":state.roomCode=m.code;state.myColor=BLACK;state.isMyTurn=true;document.getElementById("room-code-display").textContent=m.code;showScreen("waiting");break

case"opponent_joined":enterOnline();break
case"board_state":state.board=m.board;state.currentPlayer=m.currentPlayer;state.isMyTurn=state.myColor===state.currentPlayer;if(state.screen==="game"){renderBoard();updateUI()}break
case"move_made":state.board[m.row][m.col]=m.player;state.lastMove={row:m.row,col:m.col};if(!state.gameOver){state.moveHistory.push({row:m.row,col:m.col,player:m.player});state.currentPlayer=m.currentPlayer;state.isMyTurn=state.myColor===state.currentPlayer;renderBoard();updateUI()}break

case"opponent_left":showToast("对手离开了");backToMenu();break
case"error":showToast(m.message);break}}
function enterOnline(){state.mode="online";state.board=initBoard();state.currentPlayer=BLACK;state.gameOver=false;state.lastMove=null;state.winLine=null;state.moveHistory=[];state.isMyTurn=state.myColor===BLACK;document.getElementById("game-over-overlay").classList.remove("show");showScreen("game");updateUI();renderBoard()}
function createRoom(){var ui=document.getElementById("server-url");if(ui&&ui.value)svUrl(ui.value);var cd=ui&&ui.value?ui.value:"";if(!cd||cd==="ws://"||cd==="ws://:"){showToast("请先输入服务器地址");return}if(state.ws){try{state.ws.close()}catch(e){}state.ws=null}connectWS();if(state.ws&&state.ws.readyState===WebSocket.OPEN)send({type:"create_room"});else if(state.ws)state.ws.addEventListener("open",function(){send({type:"create_room"})},{once:true})}
function joinRoom(){var ui=document.getElementById("server-url");if(ui&&ui.value)svUrl(ui.value);var srv=ui&&ui.value?ui.value:"";if(!srv||srv==="ws://"||srv==="ws://:"){showToast("请先输入服务器地址");return}const cd=document.getElementById("room-code-input").value.trim();if(!cd||cd.length!==4){showToast("请输入4位房间号");return}if(state.ws){try{state.ws.close()}catch(e){}state.ws=null}connectWS();if(state.ws&&state.ws.readyState===WebSocket.OPEN)send({type:"join_room",code:cd});else if(state.ws)state.ws.addEventListener("open",function(){send({type:"join_room",code:cd})},{once:true})}
function leaveRoom(){send({type:"leave_room"});if(state.ws)state.ws.close();state.ws=null;state.connected=false;showMenu()}
function restartGame(){document.getElementById("game-over-overlay").classList.remove("show");state.pendingMove=null;if(state.mode==="online")send({type:"restart"});else{state.board=initBoard();state.currentPlayer=BLACK;state.gameOver=false;state.lastMove=null;state.winLine=null;state.moveHistory=[];renderBoard();updateUI()}}
function confirmLeave(){if(state.mode==="online"&&state.connected)send({type:"leave_room"});backToMenu()}
function toggleMenu(e){e.stopPropagation();const btn=document.getElementById("menu-btn"),old=btn.querySelector(".game-menu-dropdown");if(old){old.remove();return}const m=document.createElement("div");m.className="game-menu-dropdown";var u=state.mode==="local"?"<button class=\"game-menu-item\" onclick=\"hideDrop();undoMove()\"><span>U</span> Undo</button>":"";m.innerHTML=u+"<button class=\"game-menu-item\" onclick=\"hideDrop();restartGame()\"><span>R</span> Restart</button><button class=\"game-menu-item danger\" onclick=\"hideDrop();confirmLeave()\"><span>X</span> Quit</button>";btn.appendChild(m);var clo=function(ev){if(!m.contains(ev.target)&&ev.target!==btn){hideDrop();document.removeEventListener("click",clo)}};setTimeout(()=>document.addEventListener("click",clo),0)}
function hideDrop(){var e=document.querySelector(".game-menu-dropdown");if(e)e.remove()}
function handleBoardClick(e){e.preventDefault();if(state.gameOver||state.screen!=="game")return;if(state.mode==="online"){if(!state.connected)return;if(!state.isMyTurn){showToast("还没轮到你");return}}const p=getPos(e),cp=p2b(p.x,p.y);if(!cp||state.board[cp.row][cp.col]!==null)return;if(state.pendingMove&&state.pendingMove.row===cp.row&&state.pendingMove.col===cp.col){var mc=state.pendingMove;state.pendingMove=null;if(state.mode==="local"){state.board[mc.row][mc.col]=state.currentPlayer;state.lastMove={row:mc.row,col:mc.col};state.moveHistory.push({row:mc.row,col:mc.col,player:state.currentPlayer});const pl=state.currentPlayer;state.currentPlayer=state.currentPlayer===BLACK?WHITE:BLACK;const w=checkWin(mc.row,mc.col,pl);if(w){state.gameOver=true;state.winLine=getWinLine(mc.row,mc.col,pl);renderBoard();showGameOver(pl)}else if(isFull()){state.gameOver=true;renderBoard();showGameOver(null)}else{renderBoard();updateUI();pp();if(navigator.vibrate)navigator.vibrate(12)}}else{send({type:"make_move",row:mc.row,col:mc.col});pp();if(navigator.vibrate)navigator.vibrate(12)}}else{state.pendingMove={row:cp.row,col:cp.col};renderBoard()}}}
function showGameOver(winner){const ov=document.getElementById("game-over-overlay"),ic=document.getElementById("result-icon"),ti=document.getElementById("result-title"),su=document.getElementById("result-subtitle");if(winner===null){ic.textContent="=";ti.textContent="平局！";su.textContent="棋盘已满"}else{const n=winner.charAt(0).toUpperCase()+winner.slice(1);ic.textContent="*";if(state.mode==="online"){var me=winner===state.myColor;ti.textContent=me?"你赢了！":n+"获胜";su.textContent=me?"太棒了！":"好棋"}else{ti.textContent=n+" Wins!";su.textContent="Five in a row"}}ov.classList.add("show")}
let actx=null;function ga(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();return actx}
function pp(){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=600+Math.random()*200;o.type="sine";g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);o.start(c.currentTime);o.stop(c.currentTime+0.1)}catch(e){}}

function pl(){try{const c=ga();[400,350,300,250].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";const t=c.currentTime+i*0.12;g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.25)})}catch(e){}}
function undoMove(){if(state.mode!=="local"||state.gameOver)return;if(state.moveHistory.length===0){showToast("没有可悔的棋");return}if(navigator.vibrate)navigator.vibrate(15);const l=state.moveHistory.pop();state.board[l.row][l.col]=null;state.currentPlayer=l.player;state.lastMove=state.moveHistory.length>0?state.moveHistory[state.moveHistory.length-1]:null;state.winLine=null;document.getElementById("game-over-overlay").classList.remove("show");renderBoard();updateUI()}
async function reqWL(){try{if("wakeLock"in navigator)state.wakeLock=await navigator.wakeLock.request("screen")}catch(e){}}

const _os1=startLocalGame;startLocalGame=function(){_os1();reqWL()};
const _os2=backToMenu;backToMenu=function(){relWL();_os2()};
const _os3=showGameOver;showGameOver=function(w){_os3(w);if(state.gameOver){if(w===null)pp();else if(state.mode==="local"||(state.mode==="online"&&w===state.myColor))pw();else pl()}};
